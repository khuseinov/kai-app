  <style id="splash-screen-style">
    html {
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #FAFAF9;
    }

    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background-color: #FAFAF9;
      z-index: 999999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
    }

    .splash-glyph {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: linear-gradient(135deg, #1B4FB0 0%, #2BA8C9 55%, #F4B589 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: splash-pulse 2.4s ease-in-out infinite;
      transform-origin: center center;
    }

    .splash-glyph svg {
      width: 36px;
      height: 18px;
    }

    .splash-wordmark {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.025em;
      color: #111114;
    }

    .splash-tagline {
      font-size: 12.5px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: 0;
      color: #76767E;
    }

    @keyframes splash-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.06); }
    }

    @media (prefers-color-scheme: dark) {
      body {
        background-color: #0E0E11;
      }

      #splash {
        background-color: #0E0E11;
      }

      .splash-wordmark {
        color: #F5F5F2;
      }

      .splash-tagline {
        color: #8E8E88;
      }
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>
<body spellcheck="false">
  <div id="splash" aria-hidden="true">
    <div class="splash-glyph">
      <svg viewBox="0 0 36 18" aria-hidden="true">
        <path d="M 2 11 Q 9 3, 18 11 T 34 7" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <div class="splash-wordmark">kai</div>
    <div class="splash-tagline">ваш компаньон путешественника</div>
  </div>
  <!-- The web splash above reproduces new-design/brand.html § 02.2: vector
       glyph, wordmark and tagline centered on the themed background. It is
       removed by removeSplashFromWeb() as soon as the Flutter engine is ready,
       then the Flutter SplashScreen widget continues the same animation. -->
