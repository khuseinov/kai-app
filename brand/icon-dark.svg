<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark slate field — canon brand.html .app-icon.dark uses
         linear-gradient(135deg, #0E0E11, #1E1E23). -->
    <linearGradient id="g-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E0E11"/>
      <stop offset="1" stop-color="#1E1E23"/>
    </linearGradient>
    <linearGradient id="g-tide-corner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B4FB0"/>
      <stop offset="0.55" stop-color="#2BA8C9"/>
      <stop offset="1" stop-color="#F4B589"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#g-dark)"/>
  <svg x="164" y="408" width="696" height="186" viewBox="0 0 60 16" preserveAspectRatio="xMidYMid meet">
    <path d="M 2 10 Q 14 2, 28 10 T 56 6" stroke="url(#g-tide-corner)" stroke-width="3" stroke-linecap="round" fill="none"/>
  </svg>
</svg>
