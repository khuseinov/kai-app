name: iOS Build (Unsigned)

# Produces an unsigned IPA for personal sideloading via Sideloadly + cable.
# DO NOT change the signing setup without reading the notes below.

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # *.g.dart and *.freezed.dart are gitignored — must be generated on CI.
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # .env is gitignored but declared as a Flutter asset — create a real .env file using CI secrets
      # so the compiled release runs have access to API base and tokens.
      - name: Create .env from secrets
        run: |
          echo "API_BASE_URL=https://rustamkhuseinov-kai.hf.space" >> .env
          echo "USE_REAL_CHAT=true" >> .env
          echo "INTERNAL_HEALTH_TOKEN=2ddd1306da666a79a2eb56988b5fe84c042e4ea4d7c61ff689e42e2b1e96efba" >> .env
          echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env

      # SIGNING NOTES (do not remove these env vars):
      # Flutter 3.x validates DEVELOPMENT_TEAM even with --no-codesign.
      # The project.pbxproj Runner target has DEVELOPMENT_TEAM=PLACEHOLDER +
      # CODE_SIGN_STYLE=Manual so Xcode never contacts Apple servers.
      # These env vars are a belt-and-suspenders safeguard on top of that.
      - name: Build iOS (Unsigned)
        env:
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: flutter build ios --release --no-codesign

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qq -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-app-ios-unsigned
          path: app.ipa
          retention-days: 7
