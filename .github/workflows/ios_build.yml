name: iOS Build

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS Archive
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Install dependencies
        run: flutter pub get
        
      - name: Build iOS Archive
        run: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild archive -workspace Runner.xcworkspace -scheme Runner -archivePath build/Runner.xcarchive -configuration Release -destination 'generic/platform=iOS' CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGN_ENTITLEMENTS="" CODE_SIGNING_ALLOWED=NO
          xcodebuild -exportArchive -archivePath build/Runner.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build/output
        
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-app-ios
          path: ios/build/output/*.ipa
          retention-days: 7
