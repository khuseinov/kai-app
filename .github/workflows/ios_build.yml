name: iOS Build (Unsigned)

# Produces an unsigned IPA for personal sideloading via Sideloadly + cable.
# DO NOT change the signing setup without reading the notes below.

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      # *.g.dart and *.freezed.dart are gitignored — must be generated on CI.
      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # .env is gitignored but declared as a Flutter asset — create a real .env file using CI secrets
      # so the compiled release runs have access to API base and tokens.
      - name: Create .env from secrets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INTERNAL_HEALTH_TOKEN: ${{ secrets.INTERNAL_HEALTH_TOKEN }}
          VOICE_GATEWAY_BASE_URL: ${{ secrets.VOICE_GATEWAY_BASE_URL }}
          VOICE_GATEWAY_API_KEY: ${{ secrets.VOICE_GATEWAY_API_KEY }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::error::HF_TOKEN secret is not set" >&2
            exit 1
          fi
          if [ -z "$INTERNAL_HEALTH_TOKEN" ]; then
            echo "::error::INTERNAL_HEALTH_TOKEN secret is not set" >&2
            exit 1
          fi
          printf '%s\n' \
            "API_BASE_URL=https://rustamkhuseinov-kai.hf.space" \
            "USE_REAL_CHAT=true" \
            "INTERNAL_HEALTH_TOKEN=${INTERNAL_HEALTH_TOKEN}" \
            "HF_TOKEN=${HF_TOKEN}" \
            "VOICE_GATEWAY_BASE_URL=${VOICE_GATEWAY_BASE_URL}" \
            "VOICE_GATEWAY_API_KEY=${VOICE_GATEWAY_API_KEY}" \
            > .env

      # SIGNING NOTES (do not remove these env vars):
      # Flutter 3.x validates DEVELOPMENT_TEAM even with --no-codesign.
      # The project.pbxproj Runner target has DEVELOPMENT_TEAM=PLACEHOLDER +
      # CODE_SIGN_STYLE=Manual so Xcode never contacts Apple servers.
      # These env vars are a belt-and-suspenders safeguard on top of that.
      - name: Build iOS (Unsigned)
        env:
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
        run: flutter build ios --release --no-codesign --dart-define=KAI_DIAGNOSTICS=true

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -qq -r app.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kai-app-ios-unsigned
          path: app.ipa
          retention-days: 7
