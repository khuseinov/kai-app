name: kai_app
description: KAI — автономный travel-компаньон от Wize
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.3.5
  flutter_hooks: ^0.21.3+1
  hooks_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.2.0

  # Network
  dio: ^5.9.2
  http_parser: ^4.0.0

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.0.0

  # Models
  freezed_annotation: ^2.4.3
  json_annotation: ^4.9.0


  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  logger: ^2.4.0
  connectivity_plus: ^6.1.0
  crypto: ^3.0.0
  flutter_dotenv: ^5.1.0
  flutter_svg: ^2.0.10

  # Voice gateway integration
  record: ^5.1.0
  audio_session: ^0.1.25 # iOS playAndRecord so mic + playback coexist
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  web_socket_channel: ^3.0.1
  vad: ^0.0.5
  flutter_soloud: ^4.0.12
  opus_dart: ^3.0.1
  opus_flutter: ^3.0.3

  # Gate 3 — uncomment when needed:
  # firebase_core: ^3.3.0
  # firebase_messaging: ^15.1.0

  # Gate 4 — uncomment when needed:
  # syncfusion_flutter_pdfviewer: ^33.1.47
  # fl_chart: ^0.69.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.6
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  hive_test: ^1.0.1
  # Brand asset pipeline — see brand/BRAND_README.md.
  flutter_launcher_icons: ^0.14.1
  # Web PWA icon resizing (pure Dart, no ImageMagick).
  image: ^4.8.0
  flutter_native_splash: ^2.4.0

# Pin record_platform_interface to the last version whose abstract
# RecordPlatform provides default implementations for all members.
# record_linux 0.7.2 (pulled by record 5.2.1) does not implement
# startStream and uses the old hasPermission signature, so any interface
# >=1.3.0 breaks release kernel snapshot compilation.
#
# Remove this override once record is upgraded to a version that pulls
# record_linux >=1.0.0 (or migrates to a different recorder package).
dependency_overrides:
  record_platform_interface: 1.2.0
  record_web: 1.1.4

# Launcher-icons config — feeds platform AppIcon sets from brand/icon-1024.png.
# Run: `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "brand/icon-1024.png"
  # Keep alpha for the transparent tinted stencil; primary/dark icons are opaque.
  remove_alpha_ios: false
  # iOS 18+ dark/tinted variants. flutter_launcher_icons >=0.14.1 generates these
  # automatically and writes the matching `appearances` entries in Contents.json.
  image_path_ios_dark_transparent: "brand/icon-1024-dark.png"
  image_path_ios_tinted_grayscale: "brand/icon-1024-mono-tinted.png"
  desaturate_tinted_to_grayscale_ios: true
  # Android adaptive icon (Android 8+). Background = bg token light (#FAFAF9).
  # Foreground is the same primary icon; Android masks corners automatically.
  adaptive_icon_background: "#FAFAF9"
  adaptive_icon_foreground: "brand/icon-1024.png"

# Native-splash config.
#
# Design decision: the brand animation lives only in the Flutter SplashScreen.
# iOS, Android pre-12 and Web therefore use a solid-color native launch screen
# so there is no duplicate logo or size/position jump during the OS-to-Flutter
# handoff. Android 12+ uses the OS splash API, which requires an icon and is
# configured separately below.
# Run: `dart run flutter_native_splash:create`
flutter_native_splash:
  color: "#FAFAF9"
  color_dark: "#0E0E11"
  # No general `image`: Android pre-12 uses a solid-color native launch screen.
  # The brand animation lives exclusively in the Flutter SplashScreen, so there
  # is no duplicate logo or position jump during the OS-to-Flutter handoff.
  # Web is handled manually in web/index.html (solid theme background).
  # Android 12+ keeps the OS splash icon because the API requires one.
  # iOS is disabled here because the solid-color launch screen is maintained
  # manually in ios/Runner/Base.lproj/LaunchScreen.storyboard; enabling the
  # generator would re-add the LaunchImage placeholder imageView and asset set.
  ios: false
  android: true
  web: false
  android_12:
    image: brand/splash-glyph-1024.png
    color: "#FAFAF9"
    image_dark: brand/splash-glyph-1024.png
    color_dark: "#0E0E11"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icons/
    - brand/og-default.png
  fonts:
    # Variable font — same TTF declared per weight so requests like
    # FontWeight.w600 pick the true 600 axis instead of OS synthetic bold.
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
          weight: 300
        - asset: assets/fonts/Manrope.ttf
          weight: 400
        - asset: assets/fonts/Manrope.ttf
          weight: 500
        - asset: assets/fonts/Manrope.ttf
          weight: 600
        - asset: assets/fonts/Manrope.ttf
          weight: 700
        - asset: assets/fonts/Manrope.ttf
          weight: 800
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono.ttf
          weight: 500
